name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '!docs/latest.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Fetch latest.json from current GitHub Pages
        # The repo's docs/latest.json may be stale. The source of truth is
        # whatever the release workflow last deployed to GitHub Pages.
        # We fetch it and overwrite the repo copy so we never regress.
        run: |
          PAGES_URL="https://pollen-robotics.github.io/reachy-mini-desktop-app/latest.json"
          echo "Fetching current latest.json from GitHub Pages..."
          if curl -sf "$PAGES_URL" -o docs/latest.json; then
            echo "✅ Restored latest.json from GitHub Pages ($(jq -r .version docs/latest.json))"
          else
            echo "⚠️ Could not fetch from GitHub Pages, keeping repo version"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
