name: Release Cross-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: false
        type: string
      dry_run:
        description: 'Dry run - build without creating release or updating latest.json'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
          # Use macos-15-intel for native Intel build (no cross-compilation needed)
          # macos-latest is now ARM64 only, cross-compilation to x86_64 is unreliable
          # macos-15-intel available until August 2027
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          # Linux re-enabled with PyInstaller (solves AppImage bundling issue)
          # PyInstaller creates a standalone binary instead of bundling the venv
          # See: https://github.com/pollen-robotics/reachy-mini-desktop-app/issues/35
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Dry run mode notification
        if: github.event.inputs.dry_run == 'true'
        shell: bash
        run: |
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪 DRY RUN MODE ENABLED"
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪"
          echo "🧪 This build will:"
          echo "🧪   ✅ Build all platforms"
          echo "🧪   ✅ Sign binaries"
          echo "🧪   ✅ Generate artifacts (downloadable from Actions tab)"
          echo "🧪"
          echo "🧪 This build will NOT:"
          echo "🧪   ❌ Create a GitHub Release"
          echo "🧪   ❌ Update latest.json on GitHub Pages"
          echo "🧪   ❌ Notify users via auto-updater"
          echo "🧪"
          echo "🧪 ════════════════════════════════════════════════════════════════"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'  # LTS - Required for camera-controls (>=24.4.0)
          cache: 'yarn'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            uv-wrapper -> target
          cache-on-failure: true
          shared-key: ${{ matrix.target }}-v2

      - name: Ensure Rust target is installed
        # rust-cache doesn't cache toolchain components, so we need to ensure
        # the cross-compilation target is installed after cache restore
        shell: bash
        run: |
          echo "🔧 Installing Rust target: ${{ matrix.target }}"
          rustup target add ${{ matrix.target }}
          
          echo "🔍 Verifying target is installed..."
          INSTALLED_TARGETS=$(rustup target list --installed)
          echo "Installed targets:"
          echo "$INSTALLED_TARGETS"
          
          if ! echo "$INSTALLED_TARGETS" | grep -q "${{ matrix.target }}"; then
            echo "❌ Target ${{ matrix.target }} is NOT installed!"
            exit 1
          fi
          echo "✅ Target ${{ matrix.target }} is installed"

      - name: Install dependencies
        run: yarn install

      - name: Build sidecar (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          TARGET_TRIPLET=${{ matrix.target }} bash ./scripts/build/build-sidecar-unix.sh

      - name: Build daemon with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          echo "🐍 Building reachy-mini daemon with PyInstaller for Linux..."
          
          # Install system dependencies for PyInstaller
          # libgirepository1.0-dev + gir1.2-glib-2.0 + libcairo2-dev are needed to build PyGObject
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            python3-pip \
            libportaudio2 \
            portaudio19-dev \
            libgirepository1.0-dev \
            gir1.2-glib-2.0 \
            pkg-config \
            libcairo2-dev
          
          # Run PyInstaller build script (install from PyPI)
          REACHY_MINI_SOURCE=pypi TARGET_TRIPLET=${{ matrix.target }} bash ./scripts/build/build-daemon-pyinstaller.sh
          
          # Verify the binary was created
          DAEMON_BIN="src-tauri/binaries/reachy-mini-daemon-${{ matrix.target }}"
          if [ ! -f "$DAEMON_BIN" ]; then
            echo "❌ Daemon binary not found: $DAEMON_BIN"
            exit 1
          fi
          
          echo "✅ PyInstaller build complete"
          ls -lh "$DAEMON_BIN"

      - name: Update macOS resources config with cpython folder name
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # Find the actual cpython folder name created by uv-bundle
          CPYTHON_FOLDER=$(ls -d src-tauri/binaries/cpython-* 2>/dev/null | head -1 | xargs basename || echo "")
          
          if [ -z "$CPYTHON_FOLDER" ]; then
            echo "⚠️  No cpython folder found in src-tauri/binaries/, skipping config update"
            exit 0
          fi
          
          echo "🔧 Found cpython folder: $CPYTHON_FOLDER"
          echo "   Updating tauri.macos.conf.json..."
          
          # Update the tauri.macos.conf.json with the exact cpython folder name
          # The config has hardcoded aarch64 path, we need to replace it with the actual folder
          # IMPORTANT: Only replace the exact folder name, not /lib suffix
          sed -i '' "s|cpython-3.12.13-macos-aarch64-none|$CPYTHON_FOLDER|g" src-tauri/tauri.macos.conf.json
          
          echo "✅ Updated tauri.macos.conf.json:"
          cat src-tauri/tauri.macos.conf.json
          
          # Verify the binaries directory contents
          echo ""
          echo "📦 Contents of src-tauri/binaries/:"
          ls -la src-tauri/binaries/

      - name: Use PyInstaller config for Linux
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          echo "🔧 Using PyInstaller configuration for Linux build..."
          
          # Use the simplified PyInstaller config (single binary, no venv)
          cp src-tauri/tauri.linux.pyinstaller.conf.json src-tauri/tauri.linux.conf.json
          
          echo "✅ PyInstaller configuration active:"
          cat src-tauri/tauri.linux.conf.json
          
          # Verify the daemon binary exists
          echo ""
          echo "📦 Contents of src-tauri/binaries/:"
          ls -la src-tauri/binaries/

      - name: Build sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "🔨 Building sidecar for Windows..."
          pwsh -File ./scripts/build/build-sidecar-windows.ps1
          
          # Verify critical files exist
          Write-Host ""
          Write-Host "🔍 Verifying sidecar build output..."
          
          $requiredFiles = @(
            "src-tauri/binaries/uv.exe",
            "src-tauri/binaries/.venv"
          )
          
          $missing = @()
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              $missing += $file
            }
          }
          
          if ($missing.Count -gt 0) {
            Write-Host "❌ Missing required files after sidecar build:"
            foreach ($file in $missing) {
              Write-Host "   - $file"
            }
            Write-Host ""
            Write-Host "📦 Contents of src-tauri/binaries/:"
            Get-ChildItem src-tauri/binaries/ -ErrorAction SilentlyContinue
            exit 1
          }
          
          Write-Host "✅ Sidecar build verified!"
          Write-Host "📦 Contents of src-tauri/binaries/:"
          Get-ChildItem src-tauri/binaries/
          
          # Verify that packages were actually installed in the venv
          Write-Host ""
          Write-Host "🔍 Verifying Python packages installed..."
          $sitePackages = "src-tauri/binaries/.venv/Lib/site-packages"
          if (Test-Path $sitePackages) {
            $packageCount = (Get-ChildItem $sitePackages -Directory).Count
            $venvSize = (Get-ChildItem -Recurse "src-tauri/binaries/.venv" | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "   📦 Packages in site-packages: $packageCount directories"
            Write-Host "   📊 Venv size: $([math]::Round($venvSize, 2)) MB"
            
            # Check for reachy_mini specifically
            if (Test-Path "$sitePackages/reachy_mini") {
              Write-Host "   ✅ reachy_mini package found"
            } else {
              Write-Host "❌ ERROR: reachy_mini package NOT found in venv!"
              Write-Host "   This means pip install failed silently during build."
              Write-Host "   Contents of site-packages:"
              Get-ChildItem $sitePackages
              exit 1
            }
            
            # Verify minimum size (should be ~200MB+)
            if ($venvSize -lt 50) {
              Write-Host "❌ ERROR: Venv is too small ($([math]::Round($venvSize, 2)) MB)"
              Write-Host "   Expected at least 50 MB with all dependencies."
              Write-Host "   This indicates pip install failed."
              exit 1
            }
          } else {
            Write-Host "❌ ERROR: site-packages directory not found!"
            exit 1
          }

      - name: Update Windows resources config with cpython folder name
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Find the actual cpython folder name created by uv-bundle
          $CPYTHON_FOLDER = (Get-ChildItem -Directory "src-tauri/binaries/cpython-*" -ErrorAction SilentlyContinue | Select-Object -First 1).Name
          
          if (-not $CPYTHON_FOLDER) {
            Write-Host "❌ No cpython folder found in src-tauri/binaries/"
            Write-Host "   This is required for Windows build"
            Get-ChildItem src-tauri/binaries/ -ErrorAction SilentlyContinue
            exit 1
          }
          
          Write-Host "🔧 Found cpython folder: $CPYTHON_FOLDER"
          Write-Host "   Updating tauri.windows.conf.json..."
          
          # Update the tauri.windows.conf.json with the exact cpython folder name
          $content = Get-Content src-tauri/tauri.windows.conf.json -Raw
          $content = $content -replace 'cpython-3\.12\*-windows-x86_64\*', $CPYTHON_FOLDER
          $content = $content -replace 'cpython-3\.12-windows-x86_64', $CPYTHON_FOLDER
          $content | Set-Content src-tauri/tauri.windows.conf.json
          
          Write-Host "✅ Updated tauri.windows.conf.json:"
          Get-Content src-tauri/tauri.windows.conf.json

      - name: Setup Apple Code Signing (macOS only)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_SIGNING_IDENTITY" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "❌ Apple secrets not configured - APPLE_CERTIFICATE, APPLE_SIGNING_IDENTITY and APPLE_CERTIFICATE_PASSWORD are required"
            exit 1
          fi
          
          echo "✅ Apple variables configured"
          if [ -z "$APPLE_TEAM_ID" ]; then
            APPLE_TEAM_ID=$(echo "$APPLE_SIGNING_IDENTITY" | sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p')
            export APPLE_TEAM_ID
          fi
          
          # Import the .p12 certificate into the keychain
          echo "📦 Importing .p12 certificate into keychain..."
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Clean base64 (remove spaces, newlines) then decode
          CLEANED_CERT=$(echo "$APPLE_CERTIFICATE" | tr -d ' \n\r\t')
          
          # Debug: check base64 length and first characters
          echo "🔍 Debug base64:"
          echo "  Length: ${#CLEANED_CERT}"
          echo "  First 50 characters: ${CLEANED_CERT:0:50}"
          echo "  Last 50 characters: ${CLEANED_CERT: -50}"
          
          # Decode base64
          echo "$CLEANED_CERT" | base64 --decode > /tmp/certificate.p12
          
          # Verify file is valid before import
          echo "🔍 Verifying .p12 file..."
          file /tmp/certificate.p12 || true
          ls -lh /tmp/certificate.p12 || true
          
          # Verify .p12 is valid with openssl
          openssl pkcs12 -in /tmp/certificate.p12 -passin pass:"$APPLE_CERTIFICATE_PASSWORD" -noout -info 2>&1 | head -5 || {
            echo "⚠️  The .p12 file seems invalid or password is incorrect"
          }
          
          # Import .p12 into keychain
          # Note: security import automatically detects PKCS12 format
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security || {
            echo "❌ Error importing .p12"
            echo "🔍 Trying alternative with openssl..."
            # Alternative: convert to PEM then import
            openssl pkcs12 -in /tmp/certificate.p12 -passin pass:"$APPLE_CERTIFICATE_PASSWORD" -nodes -out /tmp/certificate.pem 2>/dev/null || {
              echo "❌ Unable to convert .p12"
              exit 1
            }
            # This method doesn't work because we lose the private key in the keychain
            # Must use security import directly with .p12
            exit 1
          }
          rm -f /tmp/certificate.p12
          
          # Configure keychain for codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          
          # Add temporary keychain FIRST in search list (priority)
          EXISTING_KEYCHAINS=$(security list-keychains -d user | sed 's/^[[:space:]]*//' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          
          # Verify identity is available in ALL keychains
          echo "🔍 Available identities in all keychains:"
          security find-identity -v -p codesigning || true
          
          # Verify specifically in our keychain
          echo "🔍 Identities in temporary keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          
          # Export variables for next steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          
          echo "✅ Certificate imported into temporary keychain"
          echo "✅ Keychain added to search list"

      - name: Setup Tauri Signing Key
        shell: bash
        env:
          TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_KEY }}
        run: |
          mkdir -p ~/.tauri
          if [ -n "$TAURI_SIGNING_KEY" ]; then
            # The key in GitHub Secrets can be either:
            # 1. Raw format (starts with "untrusted comment: rsign encrypted secret key")
            # 2. Base64-encoded format
            # We detect the format and handle accordingly
            
            # Check if it's raw format (starts with "untrusted comment")
            # Use the first 50 chars to check, avoiding issues with leading whitespace
            FIRST_CHARS=$(printf '%s' "$TAURI_SIGNING_KEY" | head -c 50)
            
            if echo "$FIRST_CHARS" | grep -q "untrusted comment"; then
              # Raw format in GitHub Secrets - encode to base64 for tauri signer
              # tauri signer expects the key file to be base64-encoded
              # Clean the raw key first (remove leading/trailing whitespace)
              CLEANED_RAW=$(printf '%s' "$TAURI_SIGNING_KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              # Encode to base64 and remove ALL newlines/whitespace (tauri signer is strict)
              if [[ "$OSTYPE" == "darwin"* ]]; then
                # macOS: base64 -b 0 or pipe to tr -d '\n'
                printf '%s' "$CLEANED_RAW" | base64 | tr -d '\n\r' > ~/.tauri/reachy-mini.key
              else
                # Linux: base64 -w 0
                printf '%s' "$CLEANED_RAW" | base64 -w 0 | tr -d '\n\r' > ~/.tauri/reachy-mini.key
              fi
              echo "✅ Encoded raw format private key to base64 (for tauri signer)"
            else
              # Already base64 format - use directly (remove ALL whitespace including newlines)
              CLEANED_KEY=$(printf '%s' "$TAURI_SIGNING_KEY" | tr -d '\n\r\t ' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              printf '%s' "$CLEANED_KEY" > ~/.tauri/reachy-mini.key
              echo "✅ Using base64 format private key (from GitHub Secrets)"
            fi
            chmod 600 ~/.tauri/reachy-mini.key
            
            # ✅ Extract public key from tauri.conf.json (standard practice - ensures they match)
            echo "🔑 Extracting public key from tauri.conf.json..."
            
            # The public key in tauri.conf.json is base64-encoded
            # We decode it to get the raw public key format that minisign expects
            PUBKEY=$(grep -o '"pubkey": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
            if [ -n "$PUBKEY" ]; then
              # Decode base64 once (single encoding in tauri.conf.json) to get raw public key format (what minisign expects)
              echo "$PUBKEY" | base64 -d > ~/.tauri/reachy-mini.key.pub
              echo "✅ Extracted public key from tauri.conf.json (decoded from base64)"
            else
              echo "❌ No public key found in tauri.conf.json"
              exit 1
            fi
            
            # ✅ Verify the key pair matches by testing signature
            if [ -f ~/.tauri/reachy-mini.key.pub ]; then
              echo "🔍 Verifying key pair match..."
              TEST_FILE="/tmp/test-key-match-$$.txt"
              echo "test" > "$TEST_FILE"
              if yarn tauri signer sign -f ~/.tauri/reachy-mini.key -p "" "$TEST_FILE" 2>/dev/null; then
                # Try to verify with the extracted public key using minisign
                if command -v minisign &> /dev/null && [ -f "$TEST_FILE.sig" ]; then
                  if minisign -V -p ~/.tauri/reachy-mini.key.pub -m "$TEST_FILE" -x "$TEST_FILE.sig" 2>/dev/null; then
                    echo "✅ Key pair verified - public key matches private key"
                  else
                    echo "❌ ERROR: Public key verification failed - keys do not match"
                    echo "   This will cause 'invalid encoding in minisign data' errors in production"
                    echo "   Build will fail to prevent releasing invalid signatures"
                    exit 1
                  fi
                fi
                rm -f "$TEST_FILE" "$TEST_FILE.sig" 2>/dev/null || true
              else
                echo "⚠️ Could not test key pair (private key may require password)"
              fi
            fi
            
            # ✅ Verify the private key is valid by attempting a test sign
            echo "🔍 Verifying private key validity..."
            TEST_FILE="/tmp/test-sign-verify-$$.txt"
            echo "test" > "$TEST_FILE"
            if yarn tauri signer sign -f ~/.tauri/reachy-mini.key -p "" "$TEST_FILE" 2>/dev/null; then
              echo "✅ Private key is valid and can sign files"
              rm -f "$TEST_FILE" "$TEST_FILE.sig" 2>/dev/null || true
            else
              echo "⚠️ Warning: Could not verify private key (may require password or key mismatch)"
            fi
            
            # ✅ Export cleaned key to GITHUB_ENV for use in build steps
            # Read the cleaned key from file (single line, no spaces/newlines)
            CLEANED_SIGNING_KEY=$(cat ~/.tauri/reachy-mini.key)
            echo "TAURI_SIGNING_PRIVATE_KEY=$CLEANED_SIGNING_KEY" >> $GITHUB_ENV
            echo "✅ Exported cleaned signing key to GITHUB_ENV"
          else
            echo "⚠️ No signing key provided, generating temporary key..."
            yarn tauri signer generate -w ~/.tauri/reachy-mini.key --ci || true
            # Export the generated key
            CLEANED_SIGNING_KEY=$(cat ~/.tauri/reachy-mini.key)
            echo "TAURI_SIGNING_PRIVATE_KEY=$CLEANED_SIGNING_KEY" >> $GITHUB_ENV
          fi

      - name: Extract version before build
        id: version
        shell: bash
        run: |
          echo "🔍 Extracting version..."
          echo "   GITHUB_REF: $GITHUB_REF"
          echo "   github.event.inputs.version: ${{ github.event.inputs.version }}"
          
          # Try to extract from tag (format: refs/tags/v0.2.15)
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            echo "   No 'v' prefix in tag, trying input..."
            VERSION=${{ github.event.inputs.version }}
          fi
          
          # If still empty, try to extract from tag without 'v' prefix
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
            if [ "$VERSION" = "$GITHUB_REF" ]; then
              echo "   No tag found, trying tauri.conf.json..."
              VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
            fi
          fi
          
          if [ -z "$VERSION" ]; then
            echo "❌ Could not determine version!"
            exit 1
          fi
          
          echo "✅ Version extracted: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "📝 Updating version in tauri.conf.json to: $VERSION"
          
          # Show current version before update
          CURRENT_VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "   Current version: $CURRENT_VERSION"
          
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          else
            sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          fi
          
          # Verify update
          UPDATED_VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "   Updated version: $UPDATED_VERSION"
          
          if [ "$UPDATED_VERSION" != "$VERSION" ]; then
            echo "❌ Version update failed! Expected: $VERSION, Got: $UPDATED_VERSION"
            exit 1
          fi
          
          echo "✅ Version updated successfully"

      - name: Setup App Store Connect API Key (macOS only)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # Verify all notarization variables are defined and valid
          if [ -z "${{ secrets.APPLE_API_KEY_CONTENT }}" ]; then
            echo "❌ APPLE_API_KEY_CONTENT is not defined"
            exit 1
          fi
          if [ -z "${{ secrets.APPLE_API_ISSUER }}" ]; then
            echo "❌ APPLE_API_ISSUER is not defined"
            exit 1
          fi
          if [ -z "${{ secrets.APPLE_API_KEY }}" ]; then
            echo "❌ APPLE_API_KEY is not defined"
            exit 1
          fi
          
          # Clean APPLE_API_ISSUER (remove spaces, newlines, etc.)
          CLEANED_ISSUER=$(echo -n "${{ secrets.APPLE_API_ISSUER }}" | tr -d ' \n\r\t')
          
          # Verify APPLE_API_ISSUER is a valid UUID
          if ! echo "$CLEANED_ISSUER" | grep -qE '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'; then
            echo "❌ APPLE_API_ISSUER is not a valid UUID"
            echo "   Received value (length: ${#CLEANED_ISSUER}): '${CLEANED_ISSUER}'"
            echo "   Expected format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
            exit 1
          fi
          
          echo "📦 Configuring App Store Connect API key for manual notarization..."
          mkdir -p ~/.appstoreconnect
          
          # Get the secret content
          KEY_CONTENT="${{ secrets.APPLE_API_KEY_CONTENT }}"
          
          # Detect if content is base64-encoded or raw PEM
          # Base64 typically doesn't start with -----BEGIN
          FIRST_CHARS=$(echo "$KEY_CONTENT" | head -c 20 | tr -d ' \n\r\t')
          
          if echo "$FIRST_CHARS" | grep -q "^-----BEGIN"; then
            echo "✅ Detected raw PEM format"
            # Raw PEM format - write directly
            printf '%s' "$KEY_CONTENT" > ~/.appstoreconnect/private_key.p8
          else
            echo "✅ Detected base64-encoded format"
            # Base64 format - decode first
            echo "$KEY_CONTENT" | tr -d ' \n\r\t' | base64 --decode > ~/.appstoreconnect/private_key.p8
          fi
          
          chmod 600 ~/.appstoreconnect/private_key.p8
          
          # Validate the key file using openssl (standard practice)
          echo "🔍 Validating private key with openssl..."
          if openssl pkey -in ~/.appstoreconnect/private_key.p8 -noout > /dev/null 2>&1; then
            echo "✅ Private key is valid and parseable by openssl"
          else
            echo "❌ Invalid private key file - openssl validation failed"
            echo ""
            echo "🔍 Debug info:"
            echo "   File size: $(wc -c < ~/.appstoreconnect/private_key.p8) bytes"
            echo "   First line: $(head -1 ~/.appstoreconnect/private_key.p8)"
            echo "   Last line: $(tail -1 ~/.appstoreconnect/private_key.p8)"
            echo ""
            echo "💡 APPLE_API_KEY_CONTENT can be stored in two formats:"
            echo "   1. Raw PEM: Copy the entire .p8 file content (including BEGIN/END lines)"
            echo "   2. Base64: Encode the .p8 file with: base64 -i Certificates.p8"
            exit 1
          fi
          
          # Clean APPLE_API_KEY as well
          CLEANED_API_KEY=$(echo -n "${{ secrets.APPLE_API_KEY }}" | tr -d ' \n\r\t')
          
          # Store in GITHUB_ENV for use in next steps
          echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_key.p8" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=$CLEANED_ISSUER" >> $GITHUB_ENV
          echo "APPLE_API_KEY=$CLEANED_API_KEY" >> $GITHUB_ENV
          echo "✅ API key configured for manual notarization"
          echo "   APPLE_API_ISSUER: ${CLEANED_ISSUER:0:8}... (valid UUID)"

      - name: Verify Rust target before build (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          echo "🔍 Pre-build verification of Rust target: ${{ matrix.target }}"
          echo "Current toolchain:"
          rustup show
          echo ""
          echo "Installed targets:"
          rustup target list --installed
          echo ""
          if ! rustup target list --installed | grep -q "${{ matrix.target }}"; then
            echo "❌ Target ${{ matrix.target }} is NOT installed before build!"
            echo "🔧 Attempting to install..."
            rustup target add ${{ matrix.target }}
          fi
          echo "✅ Target ${{ matrix.target }} verified"

      - name: Build Tauri app (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          # Don't pass APPLE_SIGNING_IDENTITY to prevent Tauri from auto-signing
          # We'll sign manually after build with our script that signs ALL binaries
          # signingIdentity is set to "-" in tauri.macos.conf.json to disable auto-signing
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Required for createUpdaterArtifacts to generate .app.tar.gz.sig
          # Use cleaned key from GITHUB_ENV (set in Setup Tauri Signing Key step)
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        shell: bash
        working-directory: src-tauri
        run: |
          # Explicitly unset any signing/notarization variables to prevent Tauri from auto-signing/notarizing
          # These might be set in GITHUB_ENV from previous steps
          unset APPLE_SIGNING_IDENTITY || true
          unset APPLE_API_ISSUER || true
          unset APPLE_API_KEY || true
          unset APPLE_API_KEY_PATH || true
          
          # Temporarily remove the signing keychain from search list to prevent Tauri from auto-detecting it
          # We'll add it back for manual signing
          if [ -n "$KEYCHAIN_PATH" ]; then
            echo "🔒 Temporarily removing signing keychain from search list..."
            EXISTING_KEYCHAINS=$(security list-keychains -d user | grep -v "$KEYCHAIN_PATH" | sed 's/^[[:space:]]*//' | tr '\n' ' ')
            security list-keychains -d user -s $EXISTING_KEYCHAINS || true
          fi
          
          echo "🔍 Verifying no auto-signing/notarization variables are set..."
          env | grep -E "APPLE_(SIGNING|API)" || echo "✅ No auto-signing/notarization variables found"
          
          # Build without automatic signing/notarization
          # signingIdentity is set to "-" in tauri.macos.conf.json
          yarn tauri build --target ${{ matrix.target }}
          
          # Restore keychain to search list for manual signing step
          if [ -n "$KEYCHAIN_PATH" ]; then
            echo "🔓 Restoring signing keychain to search list..."
            EXISTING_KEYCHAINS=$(security list-keychains -d user | sed 's/^[[:space:]]*//' | tr '\n' ' ')
            security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS || true
          fi

      - name: Setup Windows Code Signing
        if: matrix.os == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        continue-on-error: true
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PFX) -or 
              [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Warning "⚠️  Windows signing secrets not configured - skipping signature setup"
            Write-Warning "   The build will continue but binaries will not be signed"
            Write-Warning "   Configure WINDOWS_CERTIFICATE_PFX and WINDOWS_CERTIFICATE_PASSWORD secrets to enable signing"
            exit 0
          }
          
          Write-Host "✅ Windows certificate variables configured"
          
          # Decode certificate from base64
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX)
          $tempCertPath = "$env:RUNNER_TEMP\code-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($tempCertPath, $certBytes)
          
          # Verify certificate is valid
          try {
            $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
              $tempCertPath,
              $env:WINDOWS_CERTIFICATE_PASSWORD
            )
            Write-Host "✅ Certificate loaded successfully"
            Write-Host "   Subject: $($cert.Subject)"
            Write-Host "   Thumbprint: $($cert.Thumbprint)"
            
            # Export for next steps
            echo "WINDOWS_CERT_PATH=$tempCertPath" >> $env:GITHUB_ENV
            echo "WINDOWS_SIGNING_ENABLED=true" >> $env:GITHUB_ENV
          } catch {
            Write-Error "❌ Failed to load certificate: $($_.Exception.Message)"
            exit 1
          }
          
          # Find signtool.exe
          $signtoolPath = $null
          $possiblePaths = @(
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe",
            "${env:ProgramFiles}\Windows Kits\10\bin\*\x64\signtool.exe"
          )
          
          foreach ($path in $possiblePaths) {
            $found = Get-ChildItem -Path $path -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $signtoolPath = $found.FullName
              break
            }
          }
          
          if (-not $signtoolPath) {
            Write-Error "❌ signtool.exe not found"
            Write-Error "   Windows SDK should be installed on GitHub Actions runners"
            exit 1
          }
          
          Write-Host "✅ signtool.exe found: $signtoolPath"
          echo "SIGNTOOL_PATH=$signtoolPath" >> $env:GITHUB_ENV

      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        env:
          # Required for createUpdaterArtifacts to generate .msi.sig
          # Use cleaned key from GITHUB_ENV (set in Setup Tauri Signing Key step)
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        shell: bash
        working-directory: src-tauri
        run: |
          yarn tauri build --target ${{ matrix.target }}

      - name: Sign all binaries (Windows)
        if: matrix.os == 'windows-latest' && env.WINDOWS_SIGNING_ENABLED == 'true'
        env:
          WINDOWS_CERT_PATH: ${{ env.WINDOWS_CERT_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
        shell: pwsh
        run: |
          $BUNDLE_DIR = "src-tauri/target/${{ matrix.target }}/release"
          
          Write-Host "🔐 Signing Windows binaries..."
          
          # Use the existing script
          & ./scripts/signing/sign-windows-binaries.ps1 `
            -TargetPath "$BUNDLE_DIR" `
            -CertificatePath $env:WINDOWS_CERT_PATH `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD `
            -TimestampUrl "http://timestamp.digicert.com"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Failed to sign binaries"
            exit 1
          }
          
          Write-Host "✅ All binaries signed successfully!"

      - name: Sign MSI installer (Windows)
        if: matrix.os == 'windows-latest' && env.WINDOWS_SIGNING_ENABLED == 'true'
        env:
          WINDOWS_CERT_PATH: ${{ env.WINDOWS_CERT_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
        shell: pwsh
        run: |
          $MSI_DIR = "src-tauri/target/${{ matrix.target }}/release/bundle/msi"
          $MSI_FILE = Get-ChildItem -Path $MSI_DIR -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if (-not $MSI_FILE) {
            Write-Error "❌ MSI file not found in: $MSI_DIR"
            exit 1
          }
          
          Write-Host "🔐 Signing MSI installer..."
          Write-Host "   File: $($MSI_FILE.FullName)"
          
          & $env:SIGNTOOL_PATH sign `
            /f $env:WINDOWS_CERT_PATH `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /fd sha256 `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            $MSI_FILE.FullName
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Failed to sign MSI"
            exit 1
          }
          
          # Verify MSI signature
          Write-Host "✅ Verifying MSI signature..."
          & $env:SIGNTOOL_PATH verify /pa /v $MSI_FILE.FullName
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ MSI signature verification failed"
            exit 1
          }
          
          Write-Host "✅ MSI signed and verified successfully!"

      - name: Build Tauri app (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        working-directory: src-tauri
        env:
          # Required for AppImage tools to work without FUSE (not available in GitHub Actions)
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Enable verbose output for linuxdeploy debugging
          DEBUG: 1
          VERBOSE: 1
          # Prevent linuxdeploy from leaving temp files
          NO_CLEANUP: 0
        run: |
          # Install dependencies required for .deb and AppImage build
          # patchelf is CRITICAL for linuxdeploy to work
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libx11-dev \
            libxrandr-dev \
            libasound2-dev \
            libxdo-dev \
            libudev-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            curl \
            file \
            libc-bin \
            dpkg-dev \
            libfuse2 \
            squashfs-tools \
            patchelf
          
          # Verify patchelf is installed (critical for linuxdeploy)
          echo "🔍 Verifying patchelf installation..."
          which patchelf && patchelf --version
          
          # Tauri handles .deb package creation automatically
          # Set environment variables for pkg-config if needed
          export PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/share/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
          
          # Clean previous build artifacts to avoid conflicts
          rm -rf target/${{ matrix.target }}/release/bundle
          
          # Set signing key for createUpdaterArtifacts to generate .AppImage.tar.gz.sig
          # Use cleaned key from GITHUB_ENV (set in Setup Tauri Signing Key step)
          export TAURI_SIGNING_PRIVATE_KEY="${{ env.TAURI_SIGNING_PRIVATE_KEY }}"
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          
          # Show disk space before build
          echo "📊 Disk space before build:"
          df -h .
          
          # Show resources size
          echo "📦 Resources size:"
          du -sh ../binaries/* 2>/dev/null || echo "No binaries yet"
          du -sh ../binaries/.venv 2>/dev/null || echo "No venv yet"
          TOTAL_SIZE=$(du -sh ../binaries 2>/dev/null | cut -f1 || echo "unknown")
          echo "📦 Total binaries size: $TOTAL_SIZE"
          
          # Build with verbose output
          yarn tauri build --target ${{ matrix.target }} -v

      - name: Add post-install scripts to .deb (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        working-directory: src-tauri
        run: |
          DEB_DIR="target/${{ matrix.target }}/release/bundle/deb"
          DEB_FILE=$(find "$DEB_DIR" -name "*.deb" | head -1)
          
          if [ -z "$DEB_FILE" ]; then
            echo "❌ No .deb file found in $DEB_DIR"
            exit 1
          fi
          
          echo "📦 Adding post-install scripts to .deb package..."
          
          # Extract .deb
          TEMP_DIR=$(mktemp -d)
          dpkg-deb -x "$DEB_FILE" "$TEMP_DIR/extract"
          dpkg-deb -e "$DEB_FILE" "$TEMP_DIR/extract/DEBIAN"
          
          # Verify DEBIAN directory was created
          if [ ! -d "$TEMP_DIR/extract/DEBIAN" ]; then
            echo "❌ Failed to extract DEBIAN directory"
            exit 1
          fi
          
          # Copy post-install scripts to DEBIAN directory
          cp linux/deb-postinst.sh "$TEMP_DIR/extract/DEBIAN/postinst"
          cp linux/deb-postrm.sh "$TEMP_DIR/extract/DEBIAN/postrm"
          chmod +x "$TEMP_DIR/extract/DEBIAN/postinst" "$TEMP_DIR/extract/DEBIAN/postrm"
          
          # Rebuild .deb with scripts
          dpkg-deb -b "$TEMP_DIR/extract" "$DEB_FILE.new"
          if [ $? -ne 0 ]; then
            echo "❌ Failed to rebuild .deb package"
            exit 1
          fi
          mv "$DEB_FILE.new" "$DEB_FILE"
          
          # Cleanup
          rm -rf "$TEMP_DIR"
          
          echo "✅ Post-install scripts added to .deb package"

      # ===========================================
      # E2E Tests - Run directly after Linux build
      # ===========================================
      - name: Install E2E test dependencies (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          echo "📦 Installing E2E test dependencies..."
          
          # System dependencies for running the app and WebDriver
          sudo apt-get install -y \
            xvfb \
            webkit2gtk-driver \
            at-spi2-core
          
          # Install tauri-driver 2.0.x for Tauri v2
          # IMPORTANT: This project uses Tauri v2, so we need tauri-driver 2.0.x
          # (tauri-driver 0.1.x was for Tauri v1)
          echo "🦀 Installing tauri-driver (latest 2.0.x for Tauri v2)..."
          cargo install tauri-driver --locked
          
          # Verify installation
          echo "✅ tauri-driver installed: $(which tauri-driver)"

      - name: Install .deb and run E2E tests (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        env:
          # Disable DMA-BUF renderer to avoid WebKit crashes on headless CI systems
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
        run: |
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪 E2E TESTS - Validating Linux .deb package"
          echo "🧪 ════════════════════════════════════════════════════════════════"
          
          # Find and install the .deb
          DEB_FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/deb -name "*.deb" | head -1)
          
          if [ -z "$DEB_FILE" ]; then
            echo "❌ No .deb file found"
            exit 1
          fi
          
          echo "📦 Installing: $DEB_FILE"
          sudo dpkg -i "$DEB_FILE" || sudo apt-get install -f -y
          
          # Verify installation
          if [ ! -f "/usr/bin/reachy-mini-control" ]; then
            echo "❌ Application binary not found after installation"
            exit 1
          fi
          echo "✅ Application installed successfully"
          
          # Install Node.js test dependencies
          echo "📦 Installing test dependencies..."
          yarn install --frozen-lockfile
          
          # Run E2E tests with xvfb-run (official Tauri CI approach)
          # xvfb-run creates a virtual display and runs the command within it
          echo "🧪 Running E2E tests with xvfb-run..."
          xvfb-run --auto-servernum yarn test:e2e
          
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪 ✅ E2E TESTS PASSED (Linux)"
          echo "🧪 ════════════════════════════════════════════════════════════════"

      # ===========================================
      # E2E Tests - Run directly after Windows build
      # ===========================================
      - name: Install E2E test dependencies (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "📦 Installing E2E test dependencies for Windows..."
          
          # Install msedgedriver (must match Edge version on runner)
          # msedgedriver-tool automatically detects and downloads the correct version
          Write-Host "🌐 Installing msedgedriver-tool..."
          cargo install --git https://github.com/chippers/msedgedriver-tool
          
          # Run msedgedriver-tool to download matching Edge driver
          Write-Host "🌐 Downloading matching msedgedriver..."
          & "$env:USERPROFILE\.cargo\bin\msedgedriver-tool.exe"
          
          # Add current directory to PATH (msedgedriver is downloaded here)
          $env:PATH = "$PWD;$env:PATH"
          [Environment]::SetEnvironmentVariable("PATH", "$PWD;$env:PATH", "Process")
          
          # Install tauri-driver 2.0.x for Tauri v2
          Write-Host "🦀 Installing tauri-driver..."
          cargo install tauri-driver --locked
          
          # Verify installations
          Write-Host "✅ msedgedriver location: $PWD\msedgedriver.exe"
          Write-Host "✅ tauri-driver installed"

      - name: Install .msi and run E2E tests (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "🧪 ════════════════════════════════════════════════════════════════"
          Write-Host "🧪 E2E TESTS - Validating Windows .msi package"
          Write-Host "🧪 ════════════════════════════════════════════════════════════════"
          
          # Find and install the .msi
          $MSI_DIR = "src-tauri/target/${{ matrix.target }}/release/bundle/msi"
          $MSI_FILE = Get-ChildItem -Path $MSI_DIR -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if (-not $MSI_FILE) {
            Write-Error "❌ No .msi file found in: $MSI_DIR"
            exit 1
          }
          
          Write-Host "📦 Installing: $($MSI_FILE.FullName)"
          
          # Install MSI silently
          $process = Start-Process msiexec.exe -ArgumentList "/i", "`"$($MSI_FILE.FullName)`"", "/quiet", "/norestart" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            Write-Error "❌ MSI installation failed with exit code: $($process.ExitCode)"
            exit 1
          }
          
          # Find the installed application
          # The exe name comes from Cargo.toml package name: reachy-mini-control
          # The folder name comes from tauri.conf.json productName: Reachy Mini Control
          # MSI can install to Program Files (perMachine) or LocalAppData (currentUser)
          $POSSIBLE_PATHS = @(
            # Program Files paths (perMachine install - default for MSI)
            "C:\Program Files\Reachy Mini Control\reachy-mini-control.exe",
            "C:\Program Files\Reachy Mini Control\Reachy Mini Control.exe",
            "${env:ProgramFiles}\Reachy Mini Control\reachy-mini-control.exe",
            "${env:ProgramFiles}\Reachy Mini Control\Reachy Mini Control.exe",
            # LocalAppData paths (currentUser install)
            "$env:LOCALAPPDATA\Reachy Mini Control\reachy-mini-control.exe",
            "$env:LOCALAPPDATA\Reachy Mini Control\Reachy Mini Control.exe",
            # Program Files (x86) just in case
            "C:\Program Files (x86)\Reachy Mini Control\reachy-mini-control.exe",
            "C:\Program Files (x86)\Reachy Mini Control\Reachy Mini Control.exe"
          )
          
          Write-Host "🔍 Searching for installed application..."
          $APP_PATH = $null
          foreach ($path in $POSSIBLE_PATHS) {
            Write-Host "   Checking: $path"
            if (Test-Path $path) {
              $APP_PATH = $path
              Write-Host "   ✅ Found!"
              break
            }
          }
          
          if (-not $APP_PATH) {
            Write-Host "❌ Application not found at expected paths"
            Write-Host ""
            Write-Host "🔍 Searching entire disk for Reachy files..."
            Write-Host "   Searching Program Files..."
            Get-ChildItem -Path "C:\Program Files" -Filter "*reachy*" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   Found: $($_.FullName)" }
            Write-Host "   Searching Program Files (x86)..."
            Get-ChildItem -Path "C:\Program Files (x86)" -Filter "*reachy*" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   Found: $($_.FullName)" }
            Write-Host "   Searching LocalAppData..."
            Get-ChildItem -Path "$env:LOCALAPPDATA" -Filter "*reachy*" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   Found: $($_.FullName)" }
            Write-Host "   Searching AppData..."
            Get-ChildItem -Path "$env:APPDATA" -Filter "*reachy*" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   Found: $($_.FullName)" }
            Write-Error "❌ Could not find installed application"
            exit 1
          }
          
          Write-Host "✅ Application installed at: $APP_PATH"
          
          # Update wdio.conf.js to use Windows path
          # We need to set the APP_BINARY environment variable
          $env:E2E_APP_BINARY = $APP_PATH
          
          # Ensure msedgedriver is in PATH
          $env:PATH = "$PWD;$env:PATH"
          
          # Install Node.js test dependencies
          # Note: Not using --frozen-lockfile here as E2E deps may have cross-platform differences
          Write-Host "📦 Installing test dependencies..."
          yarn install
          
          # Run E2E tests (no xvfb needed on Windows)
          Write-Host "🧪 Running E2E tests..."
          yarn test:e2e
          
          Write-Host "🧪 ════════════════════════════════════════════════════════════════"
          Write-Host "🧪 ✅ E2E TESTS PASSED (Windows)"
          Write-Host "🧪 ════════════════════════════════════════════════════════════════"

      # ===========================================
      # E2E Tests - Run directly after macOS build
      # ===========================================
      - name: Install E2E test dependencies (macOS only)
        if: startsWith(matrix.os, 'macos')
        run: |
          echo "📦 Installing E2E test dependencies for macOS..."
          
          # Install Node.js test dependencies (includes @crabnebula/tauri-driver)
          echo "📦 Installing npm dependencies..."
          yarn install
          
          echo "✅ E2E dependencies installed"

      - name: Run E2E tests (macOS only)
        if: startsWith(matrix.os, 'macos')
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
        run: |
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪 E2E TESTS - Validating macOS .app bundle"
          echo "🧪 ════════════════════════════════════════════════════════════════"
          
          # Check if CN_API_KEY is configured
          if [ -z "$CN_API_KEY" ]; then
            echo "⚠️ CN_API_KEY not configured - skipping macOS E2E tests"
            echo "   To enable macOS E2E tests, add CN_API_KEY to GitHub Secrets"
            echo "   Get one at: https://crabnebula.cloud"
            echo "🧪 ════════════════════════════════════════════════════════════════"
            echo "🧪 ⏭️ E2E TESTS SKIPPED (macOS) - No CN_API_KEY"
            echo "🧪 ════════════════════════════════════════════════════════════════"
            exit 0
          fi
          
          # Find the built .app bundle
          APP_BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Reachy Mini Control.app"
          
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "❌ App bundle not found: $APP_BUNDLE"
            exit 1
          fi
          
          echo "✅ App bundle found: $APP_BUNDLE"
          
          # Set the app binary path for E2E tests
          export E2E_APP_BINARY="$APP_BUNDLE"
          
          # Run E2E tests
          echo "🧪 Running E2E tests with CrabNebula WebDriver..."
          yarn test:e2e
          
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪 ✅ E2E TESTS PASSED (macOS - ${{ matrix.target }})"
          echo "🧪 ════════════════════════════════════════════════════════════════"

      - name: Sign all binaries (macOS only)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          APP_BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Reachy Mini Control.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "❌ App bundle not found: $APP_BUNDLE"
            exit 1
          fi
          
          # Ensure signing keychain is in search list for manual signing
          if [ -n "$KEYCHAIN_PATH" ]; then
            echo "🔓 Ensuring signing keychain is in search list..."
            EXISTING_KEYCHAINS=$(security list-keychains -d user | sed 's/^[[:space:]]*//' | tr '\n' ' ')
            if ! echo "$EXISTING_KEYCHAINS" | grep -q "$KEYCHAIN_PATH"; then
              security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS || true
            fi
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          fi
          
          chmod +x scripts/signing/sign-all-binaries.sh
          bash scripts/signing/sign-all-binaries.sh "$APP_BUNDLE" "$APPLE_SIGNING_IDENTITY"
          
          # Verify all binaries are signed
          echo "🔍 Verifying all binaries are signed..."
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE" || {
            echo "❌ Some binaries are not properly signed"
            exit 1
          }

      - name: Notarize and Staple App (macOS only)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        shell: bash
        run: |
          APP_BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Reachy Mini Control.app"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "❌ App bundle not found: $APP_BUNDLE"
            exit 1
          fi
          
          cd "$BUNDLE_DIR"
          
          # Get absolute path for notarytool
          APP_BUNDLE_NAME="Reachy Mini Control.app"
          ABS_APP_BUNDLE="$(pwd)/$APP_BUNDLE_NAME"
          echo "📦 Submitting app bundle for notarization..."
          echo "   App: $ABS_APP_BUNDLE"
          
          # Create a ZIP of the app for notarization (Apple requires ZIP format for app bundles)
          APP_ZIP_NAME="Reachy.Mini.Control.app.zip"
          rm -f "$APP_ZIP_NAME"
          ditto -c -k --norsrc --keepParent "$APP_BUNDLE_NAME" "$APP_ZIP_NAME"
          ABS_APP_ZIP="$(pwd)/$APP_ZIP_NAME"
          
          echo "📦 Submitting app ZIP for notarization..."
          echo "   ZIP: $ABS_APP_ZIP ($(du -h "$APP_ZIP_NAME" | cut -f1))"
          
          NOTARIZATION_OUTPUT=$(xcrun notarytool submit "$ABS_APP_ZIP" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 60m 2>&1) || NOTARIZATION_EXIT_CODE=$?

          echo "$NOTARIZATION_OUTPUT"

          # Check if notarization was successful
          if echo "$NOTARIZATION_OUTPUT" | grep -q "status: Accepted"; then
            echo "✅ App notarization successful!"
            
            # Staple the notarization ticket to the app bundle
            echo "📎 Stapling notarization ticket to app bundle..."
            if ! xcrun stapler staple "$APP_BUNDLE_NAME"; then
              echo "❌ Failed to staple notarization ticket to app bundle"
              exit 1
            fi
            
            # Validate that the ticket was stapled correctly
            echo "🔍 Validating stapled ticket on app..."
            if ! xcrun stapler validate "$APP_BUNDLE_NAME"; then
              echo "❌ Ticket validation failed - ticket may not be stapled correctly"
              exit 1
            fi
            echo "✅ Ticket successfully stapled and validated on app bundle"
            
            # Clean up ZIP file
            rm -f "$APP_ZIP_NAME"
          else
            echo "❌ App notarization failed!"
            echo ""
            echo "🔍 Checking notarization logs..."
            
            # Extract submission ID if available
            SUBMISSION_ID=$(echo "$NOTARIZATION_OUTPUT" | grep -oE "id: [a-f0-9-]+" | head -1 | cut -d' ' -f2 || echo "")
            
            if [ -n "$SUBMISSION_ID" ]; then
              echo "   Submission ID: $SUBMISSION_ID"
              echo "   Fetching logs..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY" \
                --issuer "$APPLE_API_ISSUER" || true
            fi
            
            # Clean up ZIP file
            rm -f "$APP_ZIP_NAME"
            exit 1
          fi

      - name: Install create-dmg (macOS only)
        if: startsWith(matrix.os, 'macos')
        run: |
          echo "📦 Installing create-dmg..."
          brew install create-dmg

      - name: Create DMG installer (macOS only)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          APP_BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Reachy Mini Control.app"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "❌ App bundle not found: $APP_BUNDLE"
            exit 1
          fi
          
          # Ensure signing keychain is in search list for DMG signing
          if [ -n "$KEYCHAIN_PATH" ]; then
            echo "🔓 Ensuring signing keychain is in search list for DMG signing..."
            EXISTING_KEYCHAINS=$(security list-keychains -d user | sed 's/^[[:space:]]*//' | tr '\n' ' ')
            if ! echo "$EXISTING_KEYCHAINS" | grep -q "$KEYCHAIN_PATH"; then
              security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS || true
            fi
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          fi
          
          # Create DMG with custom script (uses create-dmg)
          echo "💿 Creating DMG installer with customize-dmg.sh..."
          ARCH_SUFFIX="${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}"
          DMG_NAME="Reachy.Mini.Control_${{ steps.version.outputs.version }}_${ARCH_SUFFIX}.dmg"
          DMG_PATH="$BUNDLE_DIR/$DMG_NAME"
          
          # Remove old DMG if exists
          rm -f "$DMG_PATH" "$BUNDLE_DIR"/*.dmg
          
          # Use the customize-dmg.sh script
          # It uses create-dmg which handles background image, icons, and Applications link
          bash scripts/build/customize-dmg.sh \
            "$APP_BUNDLE" \
            "$DMG_PATH" \
            "src-tauri/dmg-assets/background.png" \
            "Reachy Mini Control"
          
          if [ ! -f "$DMG_PATH" ]; then
            echo "❌ Failed to create DMG file"
            exit 1
          fi
          
          # Sign the DMG (required before notarization)
          # Use the same signing identity as the app
          echo "✍️ Signing DMG with identity: $APPLE_SIGNING_IDENTITY"
          if ! codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$DMG_PATH"; then
            echo "❌ DMG signing failed"
            echo "   Available identities:"
            security find-identity -v -p codesigning || true
            exit 1
          fi
          
          echo "✅ DMG created and signed: $DMG_NAME ($(du -h "$DMG_PATH" | cut -f1))"
          echo "RELEASE_DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      - name: Notarize DMG (macOS only)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          ARCH_SUFFIX="${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}"
          DMG_NAME="Reachy.Mini.Control_${{ steps.version.outputs.version }}_${ARCH_SUFFIX}.dmg"
          DMG_PATH="$BUNDLE_DIR/$DMG_NAME"
          
          if [ ! -f "$DMG_PATH" ]; then
            echo "❌ DMG not found: $DMG_PATH"
            exit 1
          fi
          
          cd "$BUNDLE_DIR"
          
          # Get absolute path for notarytool
          ABS_DMG_PATH="$(pwd)/$DMG_NAME"
          echo "📦 Submitting DMG for notarization..."
          echo "   DMG: $ABS_DMG_PATH ($(du -h "$DMG_NAME" | cut -f1))"
          
          NOTARIZATION_OUTPUT=$(xcrun notarytool submit "$ABS_DMG_PATH" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 60m 2>&1) || NOTARIZATION_EXIT_CODE=$?

          echo "$NOTARIZATION_OUTPUT"

          # Check if notarization was successful
          if echo "$NOTARIZATION_OUTPUT" | grep -q "status: Accepted"; then
            echo "✅ DMG notarization successful!"
            
            # Staple the notarization ticket to the DMG
            echo "📎 Stapling notarization ticket to DMG..."
            if ! xcrun stapler staple "$DMG_NAME"; then
              echo "❌ Failed to staple notarization ticket to DMG"
              exit 1
            fi
            
            # Validate that the ticket was stapled correctly
            echo "🔍 Validating stapled ticket..."
            if ! xcrun stapler validate "$DMG_NAME"; then
              echo "❌ Ticket validation failed - ticket may not be stapled correctly"
              exit 1
            fi
            echo "✅ Ticket successfully stapled and validated on DMG"
            
            # Also create ZIP as fallback (for users who prefer ZIP)
            # Note: ZIP is not notarized, but contains the signed app
            echo "📦 Creating ZIP file as fallback..."
            APP_BUNDLE="Reachy Mini Control.app"
            RELEASE_ZIP_NAME="Reachy.Mini.Control_${{ steps.version.outputs.version }}_${ARCH_SUFFIX}.zip"
            rm -f "$RELEASE_ZIP_NAME"
            ditto -c -k --norsrc --keepParent "$APP_BUNDLE" "$RELEASE_ZIP_NAME"
            echo "✅ Release ZIP created: $RELEASE_ZIP_NAME ($(du -h "$RELEASE_ZIP_NAME" | cut -f1))"
            echo "RELEASE_ZIP_PATH=$BUNDLE_DIR/$RELEASE_ZIP_NAME" >> $GITHUB_ENV
          else
            echo "❌ DMG notarization failed!"
            echo ""
            echo "🔍 Checking notarization logs..."
            
            # Extract submission ID if available
            SUBMISSION_ID=$(echo "$NOTARIZATION_OUTPUT" | grep -oE "id: [a-f0-9-]+" | head -1 | cut -d' ' -f2 || echo "")
            
            if [ -n "$SUBMISSION_ID" ]; then
              echo "   Submission ID: $SUBMISSION_ID"
              echo "   Fetching logs..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY" \
                --issuer "$APPLE_API_ISSUER" || true
            fi
            
            exit 1
          fi

      - name: Build update files
        env:
          RELEASE_URL_BASE: ${{ secrets.RELEASE_URL_BASE || 'https://github.com/pollen-robotics/reachy-mini-desktop-app/releases/download/v' }}
          TARGET_TRIPLET: ${{ matrix.target }}
        shell: bash
        run: |
          export RELEASE_URL_BASE
          export TARGET_TRIPLET
          echo "🔍 Building update files for platform: ${{ matrix.platform }}"
          echo "   Version: ${{ steps.version.outputs.version }}"
          echo "   Target: ${{ matrix.target }}"
          echo "   Release URL base: ${RELEASE_URL_BASE}"
          
          bash ./scripts/build/build-update.sh prod "${{ steps.version.outputs.version }}"
          
          # Verify that update.json was created
          echo "🔍 Verifying update.json was created..."
          UPDATE_JSON=$(find releases -name "update.json" -type f | head -1)
          if [ -z "$UPDATE_JSON" ]; then
            echo "❌ update.json was not created by build-update.sh"
            echo "   Check the script output above for errors"
            exit 1
          fi
          echo "✅ update.json created: $UPDATE_JSON"
          echo "   Content preview:"
          cat "$UPDATE_JSON" | jq '.' || echo "   (could not parse JSON)"

      - name: Upload update artifacts
        uses: actions/upload-artifact@v4
        with:
          name: update-${{ matrix.platform }}
          path: |
            releases/**
          retention-days: 30

      - name: Create GitHub Release
        if: matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin' && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 'Reachy Mini Control v${{ steps.version.outputs.version }}'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/msi/*.msi.sig
            src-tauri/target/*/release/bundle/appimage/*.AppImage
            src-tauri/target/*/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/*/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.zip
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.zip
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            releases/**/*.tar.gz
            releases/**/*.zip
            releases/**/*.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to existing release
        if: (matrix.os != 'macos-latest' || matrix.target != 'aarch64-apple-darwin') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            ${{ matrix.os == 'windows-latest' && format('src-tauri/target/{0}/release/bundle/msi/*.msi', matrix.target) || '' }}
            ${{ matrix.os == 'windows-latest' && format('src-tauri/target/{0}/release/bundle/msi/*.msi.sig', matrix.target) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('src-tauri/target/{0}/release/bundle/deb/*.deb', matrix.target) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('src-tauri/target/{0}/release/bundle/appimage/*.AppImage', matrix.target) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('src-tauri/target/{0}/release/bundle/appimage/*.AppImage.tar.gz', matrix.target) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('src-tauri/target/{0}/release/bundle/appimage/*.AppImage.tar.gz.sig', matrix.target) || '' }}
            ${{ startsWith(matrix.os, 'macos') && format('src-tauri/target/{0}/release/bundle/macos/*.dmg', matrix.target) || '' }}
            ${{ startsWith(matrix.os, 'macos') && format('src-tauri/target/{0}/release/bundle/macos/*.zip', matrix.target) || '' }}
            ${{ startsWith(matrix.os, 'macos') && format('src-tauri/target/{0}/release/bundle/macos/*.app.tar.gz', matrix.target) || '' }}
            ${{ startsWith(matrix.os, 'macos') && format('src-tauri/target/{0}/release/bundle/macos/*.app.tar.gz.sig', matrix.target) || '' }}
            releases/**/*.tar.gz
            releases/**/*.zip
            releases/**/*.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        shell: bash
        run: |
          echo ""
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪 DRY RUN BUILD COMPLETE - ${{ matrix.platform }}"
          echo "🧪 ════════════════════════════════════════════════════════════════"
          echo "🧪"
          echo "🧪 Artifacts are available in the 'update-${{ matrix.platform }}' artifact"
          echo "🧪 Download them from the Actions tab → this workflow run → Artifacts section"
          echo "🧪"
          echo "🧪 No release was created, no users will be notified."
          echo "🧪 ════════════════════════════════════════════════════════════════"

  create-update-manifest:
    needs: build-and-release
    runs-on: ubuntu-latest
    # Skip this job in dry_run mode - don't update latest.json or create release
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.event.inputs.dry_run != 'true'
    permissions:
      contents: write
      actions: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION=${{ github.event.inputs.version }}
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all update artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: update-*
          merge-multiple: true
          path: update-artifacts

      - name: Verify update artifacts were downloaded
        run: |
          echo "🔍 Verifying update artifacts were downloaded..."
          
          # List all downloaded artifacts
          echo "📦 Contents of update-artifacts directory:"
          find update-artifacts -type f -o -type d | head -20 || echo "   (directory may be empty)"
          
          # Check if any update.json files exist
          UPDATE_FILES=$(find update-artifacts -name "update.json" -type f 2>/dev/null || true)
          
          if [ -z "$UPDATE_FILES" ]; then
            echo "❌ No update.json files found in downloaded artifacts"
            echo ""
            echo "🔍 Debug information:"
            echo "   - Artifacts directory exists: $([ -d update-artifacts ] && echo 'YES' || echo 'NO')"
            if [ -d update-artifacts ]; then
              echo "   - Directory contents:"
              ls -la update-artifacts/ || echo "     (cannot list contents)"
              echo "   - Recursive contents:"
              find update-artifacts -type f | head -10 || echo "     (no files found)"
            fi
            echo ""
            echo "❌ This indicates that the 'Build update files' step in build-and-release job failed or did not run"
            echo "   Check the logs of each platform build to see why update.json files were not generated"
            exit 1
          fi
          
          echo "✅ Found update.json files:"
          echo "$UPDATE_FILES" | while IFS= read -r file; do
            echo "   - $file"
            if [ -f "$file" ]; then
              echo "     Version: $(jq -r '.version' "$file" 2>/dev/null || echo 'unknown')"
            fi
          done

      - name: Merge update.json files into latest.json
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          
          UPDATE_FILES=$(find update-artifacts -name "update.json" -type f)
          
          if [ -z "$UPDATE_FILES" ]; then
            echo "❌ No update.json files found (this should not happen after verification step)"
            exit 1
          fi
          
          FIRST_FILE=$(echo "$UPDATE_FILES" | head -n1)
          VERSION=$(jq -r '.version' "$FIRST_FILE")
          NOTES=$(jq -r '.notes' "$FIRST_FILE")
          PUB_DATE=$(jq -r '.pub_date' "$FIRST_FILE")
          
          MERGED_PLATFORMS="{}"
          for FILE in $UPDATE_FILES; do
            PLATFORM_DATA=$(jq -c '.platforms' "$FILE")
            MERGED_PLATFORMS=$(echo "$MERGED_PLATFORMS" | jq --argjson platforms "$PLATFORM_DATA" '. + $platforms')
          done
          
          MERGED_JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$MERGED_PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}')
          
          echo "✅ Merged JSON created:"
          echo "$MERGED_JSON" | jq '.'
          
          # ✅ DRY: Create latest.json in root for release upload
          echo "$MERGED_JSON" > latest.json
          echo "✅ Created latest.json (version: $VERSION)"
          
          # ✅ DRY: Create directly in docs/ for GitHub Pages (no copy needed)
          mkdir -p docs
          echo "$MERGED_JSON" > docs/latest.json
          echo "✅ Created docs/latest.json for GitHub Pages (version: $VERSION)"
          
          # Verify the version matches what we expect
          echo "🔍 Verifying version consistency..."
          LATEST_VERSION=$(echo "$MERGED_JSON" | jq -r '.version')
          EXPECTED_VERSION="${{ steps.version.outputs.version }}"
          if [ "$LATEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "⚠️  Warning: Version mismatch!"
            echo "   Expected: $EXPECTED_VERSION"
            echo "   Found in latest.json: $LATEST_VERSION"
          else
            echo "✅ Version matches: $LATEST_VERSION"
          fi
          
          # Verify both files exist and are valid JSON
          if [ ! -f "latest.json" ] || [ ! -f "docs/latest.json" ]; then
            echo "❌ Failed to create latest.json files"
            exit 1
          fi
          
          if ! jq empty latest.json 2>/dev/null || ! jq empty docs/latest.json 2>/dev/null; then
            echo "❌ Invalid JSON in latest.json files"
            exit 1
          fi
          
          echo "✅ Verified JSON files are valid"

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: latest.json
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub Pages file
        # ✅ Robust: Verify file exists and is valid before deployment
        run: |
          if [ ! -f "docs/latest.json" ]; then
            echo "❌ docs/latest.json not found, cannot deploy"
            exit 1
          fi
          echo "✅ Verified docs/latest.json exists"
          cat docs/latest.json

      - name: Setup Pages
        # ✅ Standard: Official GitHub action to configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for GitHub Pages
        # ✅ Standard: Official GitHub action to upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        # ✅ Standard: Official GitHub action to deploy Pages
        # ✅ Robust: Fail if deployment fails
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: false

      - name: Verify deployment
        # ✅ Intelligent: Verify that the file is accessible after deployment
        # Note: This may take a few seconds for GitHub Pages to propagate
        run: |
          echo "⏳ Waiting for GitHub Pages to propagate (up to 30s)..."
          sleep 5
          
          PAGES_URL="https://pollen-robotics.github.io/reachy-mini-desktop-app/latest.json"
          MAX_RETRIES=6
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sf "$PAGES_URL" > /dev/null 2>&1; then
              echo "✅ GitHub Pages deployment verified at: $PAGES_URL"
              curl -s "$PAGES_URL" | jq -r '.version' | xargs -I {} echo "   Version deployed: {}"
              exit 0
            fi
            echo "   Attempt $i/$MAX_RETRIES: Not yet available, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          
          echo "⚠️  Warning: Could not verify deployment (may take longer to propagate)"
          echo "   URL: $PAGES_URL"
          # Don't fail the workflow - deployment may still succeed, just needs more time

